<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Tic Tac Toe 2099</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --bg-color: #050510;
            --grid-color: rgba(255, 255, 255, 0.05);
            --blue-neon: #00f3ff;
            --purple-neon: #bc13fe;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #110022 0%, #050510 100%);
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--blue-neon);
            text-shadow: 0 0 5px var(--blue-neon), 0 0 20px var(--blue-neon);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            background: transparent;
            border: 1px solid var(--blue-neon);
            color: var(--blue-neon);
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px var(--blue-neon);
            box-shadow: inset 0 0 10px rgba(0, 243, 255, 0.1), 0 0 10px rgba(0, 243, 255, 0.2);
        }

        button:hover, button.active {
            background: var(--blue-neon);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--blue-neon), 0 0 30px var(--blue-neon);
            text-shadow: none;
        }

        button.purple-btn {
            border-color: var(--purple-neon);
            color: var(--purple-neon);
            text-shadow: 0 0 5px var(--purple-neon);
            box-shadow: inset 0 0 10px rgba(188, 19, 254, 0.1), 0 0 10px rgba(188, 19, 254, 0.2);
        }

        button.purple-btn:hover {
            background: var(--purple-neon);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--purple-neon), 0 0 30px var(--purple-neon);
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .score-box {
            text-align: center;
            flex: 1;
        }

        .score-box h3 {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        .score-box span {
            font-size: 1.5rem;
            font-weight: 900;
        }

        #scoreX { color: var(--blue-neon); text-shadow: 0 0 10px var(--blue-neon); }
        #scoreO { color: var(--purple-neon); text-shadow: 0 0 10px var(--purple-neon); }
        #scoreDraws { color: #fff; text-shadow: 0 0 10px #fff; }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 90vw;
            max-width: 400px;
            aspect-ratio: 1/1;
            margin-bottom: 30px;
        }

        .cell {
            background: var(--grid-color);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .cell.x {
            color: var(--blue-neon);
            text-shadow: 0 0 15px var(--blue-neon), 0 0 30px var(--blue-neon);
        }

        .cell.o {
            color: var(--purple-neon);
            text-shadow: 0 0 15px var(--purple-neon), 0 0 30px var(--purple-neon);
        }

        .cell.win-pulse {
            animation: winPulse 1s infinite alternate;
        }

        @keyframes winPulse {
            0% { transform: scale(1); box-shadow: inset 0 0 10px currentColor, 0 0 10px currentColor; }
            100% { transform: scale(1.05); box-shadow: inset 0 0 30px currentColor, 0 0 40px currentColor; }
        }

        .status {
            font-size: 1.2rem;
            margin-bottom: 20px;
            height: 24px;
            letter-spacing: 1px;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .cell { font-size: 3rem; }
            .controls { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>

    <h1>Future Tic Tac Toe <br><span style="font-size: 1.5rem; color: #fff; text-shadow: 0 0 10px #fff;">2099</span></h1>

    <div class="controls">
        <button id="btn-1p" class="active">1 Player (AI)</button>
        <button id="btn-2p">2 Players</button>
    </div>

    <div class="scoreboard">
        <div class="score-box">
            <h3>PLAYER X</h3>
            <span id="scoreX">0</span>
        </div>
        <div class="score-box">
            <h3>DRAWS</h3>
            <span id="scoreDraws">0</span>
        </div>
        <div class="score-box">
            <h3>PLAYER O</h3>
            <span id="scoreO">0</span>
        </div>
    </div>

    <div class="status" id="status-text">SYSTEM READY. X GOES FIRST.</div>

    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <div class="controls">
        <button id="btn-reset" class="purple-btn">Clear Grid</button>
        <button id="btn-new" class="purple-btn">Reset Scores</button>
    </div>

    <script>
        // Futuristic Audio Engine using Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'clickX') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'clickO') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.1);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'win') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(600, now + 0.1);
                osc.frequency.setValueAtTime(800, now + 0.2);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            } else if (type === 'draw') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.4);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            }
        }

        // Game Logic Variables
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status-text');
        const btn1P = document.getElementById('btn-1p');
        const btn2P = document.getElementById('btn-2p');
        const btnReset = document.getElementById('btn-reset');
        const btnNew = document.getElementById('btn-new');
        
        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let isGameActive = true;
        let isSinglePlayer = true;
        let scores = { X: 0, O: 0, Draws: 0 };

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        // Initialize Game
        function init() {
            cells.forEach(cell => cell.addEventListener('click', handleCellClick));
            btnReset.addEventListener('click', resetBoard);
            btnNew.addEventListener('click', resetGame);
            btn1P.addEventListener('click', () => setMode(true));
            btn2P.addEventListener('click', () => setMode(false));
        }

        function setMode(singlePlayer) {
            isSinglePlayer = singlePlayer;
            btn1P.classList.toggle('active', singlePlayer);
            btn2P.classList.toggle('active', !singlePlayer);
            resetBoard();
        }

        function handleCellClick(e) {
            const cell = e.target;
            const index = cell.getAttribute('data-index');

            if (board[index] !== '' || !isGameActive) return;

            makeMove(cell, index, currentPlayer);
            
            if (isGameActive && isSinglePlayer && currentPlayer === 'O') {
                setTimeout(makeAIMove, 400); // Small delay for realistic futuristic feel
            }
        }

        function makeMove(cell, index, player) {
            board[index] = player;
            cell.innerText = player;
            cell.classList.add(player.toLowerCase());
            playSound(player === 'X' ? 'clickX' : 'clickO');
            
            checkWin();
        }

        function checkWin() {
            let roundWon = false;
            let winningCells = [];

            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    roundWon = true;
                    winningCells = [a, b, c];
                    break;
                }
            }

            if (roundWon) {
                statusText.innerText = `UNIT ${currentPlayer} DEFEATED THE OPPONENT!`;
                statusText.style.color = currentPlayer === 'X' ? 'var(--blue-neon)' : 'var(--purple-neon)';
                statusText.style.textShadow = `0 0 10px ${currentPlayer === 'X' ? 'var(--blue-neon)' : 'var(--purple-neon)'}`;
                isGameActive = false;
                scores[currentPlayer]++;
                updateScoreboard();
                playSound('win');
                
                winningCells.forEach(index => {
                    cells[index].classList.add('win-pulse');
                });
                return;
            }

            if (!board.includes('')) {
                statusText.innerText = "GRID LOCKED. DRAW DETECTED.";
                statusText.style.color = '#fff';
                statusText.style.textShadow = '0 0 10px #fff';
                isGameActive = false;
                scores.Draws++;
                updateScoreboard();
                playSound('draw');
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            statusText.innerText = `UNIT ${currentPlayer}'S TURN`;
            statusText.style.color = 'var(--text-color)';
            statusText.style.textShadow = 'none';
        }

        // Unbeatable AI using Minimax Algorithm
        function makeAIMove() {
            if (!isGameActive) return;
            let bestScore = -Infinity;
            let move;

            for (let i = 0; i < board.length; i++) {
                if (board[i] === '') {
                    board[i] = 'O';
                    let score = minimax(board, 0, false);
                    board[i] = '';
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            
            if (move !== undefined) {
                makeMove(cells[move], move, 'O');
            }
        }

        let aiScores = { 'O': 10, 'X': -10, 'tie': 0 };

        function checkWinnerForMinimax() {
            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return board[a];
                }
            }
            if (!board.includes('')) return 'tie';
            return null;
        }

        function minimax(board, depth, isMaximizing) {
            let result = checkWinnerForMinimax();
            if (result !== null) return aiScores[result];

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < board.length; i++) {
                    if (board[i] === '') {
                        board[i] = 'O';
                        let score = minimax(board, depth + 1, false);
                        board[i] = '';
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < board.length; i++) {
                    if (board[i] === '') {
                        board[i] = 'X';
                        let score = minimax(board, depth + 1, true);
                        board[i] = '';
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function updateScoreboard() {
            document.getElementById('scoreX').innerText = scores.X;
            document.getElementById('scoreO').innerText = scores.O;
            document.getElementById('scoreDraws').innerText = scores.Draws;
        }

        function resetBoard() {
            board = ['', '', '', '', '', '', '', '', ''];
            isGameActive = true;
            currentPlayer = 'X';
            statusText.innerText = "SYSTEM READY. X GOES FIRST.";
            statusText.style.color = 'var(--text-color)';
            statusText.style.textShadow = 'none';
            cells.forEach(cell => {
                cell.innerText = '';
                cell.classList.remove('x', 'o', 'win-pulse');
            });
        }

        function resetGame() {
            scores = { X: 0, O: 0, Draws: 0 };
            updateScoreboard();
            resetBoard();
        }

        init();
    </script>
</body>
</html>
